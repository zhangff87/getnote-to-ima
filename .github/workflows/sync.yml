name: 自动同步 get笔记 → ima

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 同步觉察日记
        env:
          GETNOTE_CLIENT_ID: ${{ secrets.GETNOTE_CLIENT_ID }}
          GETNOTE_API_KEY: ${{ secrets.GETNOTE_API_KEY }}
          IMA_OPENAPI_CLIENTID: ${{ secrets.IMA_OPENAPI_CLIENTID }}
          IMA_OPENAPI_APIKEY: ${{ secrets.IMA_OPENAPI_APIKEY }}
        run: python sync_getnote_to_ima.py
